services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_PORT
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whale_tracker -d whale_tracker"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
      

  api:
    build: .
    image: whale-tracker:latest
    command:
      - whale-tracker
      - api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-reload
    environment:
      - WHALE_TRACKER_POSTGRES_DB
      - WHALE_TRACKER_POSTGRES_USER
      - WHALE_TRACKER_POSTGRES_PASSWORD
      - WHALE_TRACKER_POSTGRES_HOST
      - WHALE_TRACKER_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    build: .
    image: whale-tracker:latest
    command:
      - whale-tracker
      - schedule
    environment:
      - WHALE_TRACKER_POSTGRES_DB
      - WHALE_TRACKER_POSTGRES_USER
      - WHALE_TRACKER_POSTGRES_PASSWORD
      - WHALE_TRACKER_POSTGRES_HOST
      - WHALE_TRACKER_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cli:
    build: .
    image: whale-tracker:latest
    entrypoint:
      - whale-tracker
    command:
      - --help
    environment:
      - WHALE_TRACKER_POSTGRES_DB
      - WHALE_TRACKER_POSTGRES_USER
      - WHALE_TRACKER_POSTGRES_PASSWORD
      - WHALE_TRACKER_POSTGRES_HOST
      - WHALE_TRACKER_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres-data:

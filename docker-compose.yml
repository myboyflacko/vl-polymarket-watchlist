services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POLYMARKET_STORAGE_POSTGRES_DB:-vl_polymarket_watchlist}
      POSTGRES_USER: ${POLYMARKET_STORAGE_POSTGRES_USER:-vl_polymarket_watchlist}
      POSTGRES_PASSWORD: ${POLYMARKET_STORAGE_POSTGRES_PASSWORD:-vl_polymarket_watchlist}
      POSTGRES_PORT: ${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vl_polymarket_watchlist -d vl_polymarket_watchlist"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - ${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}:${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}
      
  scheduler:
    build: .
    image: vl-polymarket-watchlist:latest
    command:
      - vl-polymarket-watchlist
      - schedule
    environment:
      - POLYMARKET_STORAGE_POSTGRES_DB
      - POLYMARKET_STORAGE_POSTGRES_USER
      - POLYMARKET_STORAGE_POSTGRES_PASSWORD
      - POLYMARKET_STORAGE_POSTGRES_HOST
      - POLYMARKET_STORAGE_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cli:
    build: .
    image: vl-polymarket-watchlist:latest
    entrypoint:
      - vl-polymarket-watchlist
    command:
      - --help
    environment:
      - POLYMARKET_STORAGE_POSTGRES_DB
      - POLYMARKET_STORAGE_POSTGRES_USER
      - POLYMARKET_STORAGE_POSTGRES_PASSWORD
      - POLYMARKET_STORAGE_POSTGRES_HOST
      - POLYMARKET_STORAGE_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres-data:

services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POLYMARKET_STORAGE_POSTGRES_DB:-polymarket_storage}
      POSTGRES_USER: ${POLYMARKET_STORAGE_POSTGRES_USER:-polymarket_storage}
      POSTGRES_PASSWORD: ${POLYMARKET_STORAGE_POSTGRES_PASSWORD:-polymarket_storage}
      POSTGRES_PORT: ${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket_storage -d polymarket_storage"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - ${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}:${POLYMARKET_STORAGE_POSTGRES_PORT:-5432}
      
  scheduler:
    build: .
    image: polymarket-storage:latest
    command:
      - polymarket-storage
      - schedule
    environment:
      - POLYMARKET_STORAGE_POSTGRES_DB
      - POLYMARKET_STORAGE_POSTGRES_USER
      - POLYMARKET_STORAGE_POSTGRES_PASSWORD
      - POLYMARKET_STORAGE_POSTGRES_HOST
      - POLYMARKET_STORAGE_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cli:
    build: .
    image: polymarket-storage:latest
    entrypoint:
      - polymarket-storage
    command:
      - --help
    environment:
      - POLYMARKET_STORAGE_POSTGRES_DB
      - POLYMARKET_STORAGE_POSTGRES_USER
      - POLYMARKET_STORAGE_POSTGRES_PASSWORD
      - POLYMARKET_STORAGE_POSTGRES_HOST
      - POLYMARKET_STORAGE_POSTGRES_PORT
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres-data:

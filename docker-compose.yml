services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whale_tracker
      POSTGRES_USER: whale_tracker
      POSTGRES_PASSWORD: whale_tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whale_tracker -d whale_tracker"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    image: whale-tracker:local
    command:
      - whale-tracker
      - api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-reload
    environment:
      WHALE_TRACKER_POSTGRES_DB: whale_tracker
      WHALE_TRACKER_POSTGRES_USER: whale_tracker
      WHALE_TRACKER_POSTGRES_PASSWORD: whale_tracker
      WHALE_TRACKER_POSTGRES_HOST: postgres
      WHALE_TRACKER_POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  scheduler:
    build: .
    image: whale-tracker:local
    command:
      - whale-tracker
      - schedule
    environment:
      WHALE_TRACKER_POSTGRES_DB: whale_tracker
      WHALE_TRACKER_POSTGRES_USER: whale_tracker
      WHALE_TRACKER_POSTGRES_PASSWORD: whale_tracker
      WHALE_TRACKER_POSTGRES_HOST: postgres
      WHALE_TRACKER_POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  cli:
    build: .
    image: whale-tracker:local
    entrypoint:
      - whale-tracker
    command:
      - --help
    environment:
      WHALE_TRACKER_POSTGRES_DB: whale_tracker
      WHALE_TRACKER_POSTGRES_USER: whale_tracker
      WHALE_TRACKER_POSTGRES_PASSWORD: whale_tracker
      WHALE_TRACKER_POSTGRES_HOST: postgres
      WHALE_TRACKER_POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    volumes:
      - ./logs:/app/logs

volumes:
  postgres-data:
